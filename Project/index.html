<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"/>
    <title>ChartVIEW</title>    
    
    <script src="https://s3.tradingview.com/tv.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
    <body>

<div id="loader">
    <img class="logo" src="icon/icon.png">
    <div style="font-size:20px;font-weight:600;">XJO Status</div>
    <div style="font-size:12px;opacity:.6;">Loading market data...</div>
</div>

<div class="app">

    <div class="page active" id="stock">
        <div id="chart"></div>
    </div>

    <div class="page" id="news">
        <div id="newsBox"></div>
    </div>

    <div class="settings" id="settingsPanel">
        <div class="row">
            <div class="btn" onclick="dark()">Dark</div>
            <div class="btn" onclick="light()">Light</div>
        </div>
    </div>

    <div class="nav">
        <div class="pill" id="pill"></div>

        <div class="tab" onmouseenter="hoverTab(0)" onclick="go('stock')">
            <div class="icon">
                <img id="stockIcon" src="icon/dark-stock.png">
            </div>
            <div class="label">Stock</div>
        </div>

        <div class="tab" onmouseenter="hoverTab(1)" onclick="toggleSettings()">
            <div class="icon">
                <img id="settingsIcon" src="icon/dark-settings.png">
            </div>
            <div class="label">Settings</div>
        </div>

        <div class="tab" onmouseenter="hoverTab(2)" onclick="go('news')">
            <div class="icon">
                <img id="newsIcon" src="icon/dark-news.png">
            </div>
            <div class="label">News</div>
        </div>
    </div>

</div>

<script src="script.js"></script>

</body>
</html>
